services:
  - type: web
    name: drf-crud-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: if [ -d backend ]; then cd backend; fi; pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: if [ -d backend ]; then cd backend; fi; gunicorn core.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.9
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://drf-crud.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://drf-crud.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: drf-crud-db
          property: connectionString

databases:
  - name: drf-crud-db
    plan: free
    databaseName: drf_crud
    user: drf_crud_user
